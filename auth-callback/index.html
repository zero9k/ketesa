      manifest.json provides metadata used when your web app is installed on a

    <title>Ketesa</title>
    <style>
      :root {
        color-scheme: light dark;
        --loader-bg: #f0f2f5;
        --loader-fg: #1858d5;
        --loader-fg-alpha: rgba(24, 88, 213, 0.12);
        --loader-accent: rgba(244, 147, 0, 0.08);
        --loader-card-bg: rgba(255, 255, 255, 0.8);
        --loader-card-border: rgba(229, 231, 235, 0.8);
        --loader-card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --loader-bg: #0c1318;
          --loader-fg: #f49300;
          --loader-fg-alpha: rgba(244, 147, 0, 0.15);
          --loader-accent: rgba(244, 147, 0, 0.08);
          --loader-card-bg: rgba(21, 28, 36, 0.75);
          --loader-card-border: rgba(244, 147, 0, 0.18);
          --loader-card-shadow: 0 0 30px rgba(244, 147, 0, 0.1), 0 8px 32px rgba(0, 0, 0, 0.3);
        }
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", "Work Sans", system-ui, sans-serif;
      }

      .layout {
        min-height: 90vh !important;
        height: 90vh;
      }

      .loader-container {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        flex-direction: column;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: var(--loader-bg);
        overflow: hidden;
      }

      .loader-container::before,
      .loader-container::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .loader-container::before {
        background:
          radial-gradient(circle 320px at 15% 25%, var(--loader-fg-alpha) 0%, transparent 70%),
          radial-gradient(circle 250px at 80% 75%, var(--loader-accent) 0%, transparent 70%),
          radial-gradient(circle 200px at 75% 20%, var(--loader-fg-alpha) 0%, transparent 70%);
        animation: bgFloat1 20s ease-in-out infinite;
      }

      .loader-container::after {
        background:
          radial-gradient(circle 220px at 35% 55%, var(--loader-fg-alpha) 0%, transparent 70%),
          radial-gradient(circle 180px at 65% 45%, var(--loader-accent) 0%, transparent 70%);
        animation:
          bgFloat2 25s ease-in-out infinite,
          bgPulse 8s ease-in-out infinite;
      }

      .loader-bg-orb {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(60px);
      }

      .loader-bg-orb-1 {
        width: 400px;
        height: 400px;
        top: -5%;
        right: -5%;
        background: var(--loader-fg-alpha);
        animation: bgFloat3 22s ease-in-out infinite;
      }

      .loader-bg-orb-2 {
        width: 300px;
        height: 300px;
        bottom: 10%;
        left: -3%;
        background: var(--loader-accent);
        animation: bgFloat1 18s ease-in-out infinite reverse;
      }

      .loader-container.fade-out {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }

      .loader-card {
        position: relative;
        z-index: 1;
        width: 30rem;
        min-height: 534px;
        margin-top: 6rem;
        border-radius: 8px;
        background: var(--loader-card-bg);
        backdrop-filter: blur(16px);
        border: 1px solid var(--loader-card-border);
        box-shadow: var(--loader-card-shadow);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 48px 32px;
        box-sizing: border-box;
      }

      @media (max-width: 600px) {
        .loader-card {
          width: 100%;
          min-height: 100vh;
          margin-top: 0;
          border-radius: 0;
          border: none;
        }
        .loader-spark {
          offset-path: rect(0% 100% 100% 0%);
        }
      }

      .loader-spark {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--loader-fg);
        box-shadow:
          0 0 14px var(--loader-fg),
          0 0 28px var(--loader-fg);
        offset-path: rect(0% 100% 100% 0% round 8px);
        animation: sparkTravel 4s linear infinite;
        z-index: 2;
      }

      .loader-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: var(--loader-fg-alpha);
        animation: placeholderPulse 2s ease-in-out infinite;
      }

      .loader-line {
        height: 14px;
        border-radius: 4px;
        background: var(--loader-fg-alpha);
        animation: placeholderPulse 2s ease-in-out infinite;
      }

      .loader-line-short {
        width: 45%;
        animation-delay: 0.15s;
      }

      .loader-line-long {
        width: 75%;
        animation-delay: 0.3s;
      }

      .loader-line-medium {
        width: 60%;
        animation-delay: 0.45s;
      }

      .auth-callback-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 32px;
        min-height: 100vh;
        box-sizing: border-box;
        text-align: center;
        background-color: var(--loader-bg);
        color: #1f1f1f;
      }

      @media (prefers-color-scheme: dark) {
        .auth-callback-error {
          color: #f2f2f2;
        }
      }

      .auth-callback-error__title {
        margin: 0;
        font-size: 24px;
      }

      .auth-callback-error__message {
        margin: 0;
        max-width: 520px;
        font-size: 14px;
        opacity: 0.9;
        word-break: break-word;
      }

      .auth-callback-error__button {
        border: none;
        border-radius: 4px;
        padding: 10px 18px;
        font-size: 14px;
        cursor: pointer;
        background: var(--loader-fg);
        color: #fff;
      }

      .auth-callback-error__button:focus-visible {
        outline: 2px solid var(--loader-fg);
        outline-offset: 2px;
      }

      @keyframes sparkTravel {
        0% {
          offset-distance: 0%;
        }
        100% {
          offset-distance: 100%;
        }
      }

      @keyframes placeholderPulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.8;
        }
      }

      @keyframes bgFloat1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(60px, -40px) scale(1.1);
        }
        50% {
          transform: translate(-30px, 60px) scale(0.95);
        }
        75% {
          transform: translate(40px, 30px) scale(1.05);
        }
      }

      @keyframes bgFloat2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(-50px, 50px) scale(1.08);
        }
        66% {
          transform: translate(70px, -20px) scale(0.92);
        }
      }

      @keyframes bgFloat3 {
        0% {
          transform: translateY(0) rotate(0deg) scale(1);
        }
        25% {
          transform: translateY(-12px) rotate(2deg) scale(1.03);
        }
        50% {
          transform: translateY(-4px) rotate(-1deg) scale(0.98);
        }
        75% {
          transform: translateY(-14px) rotate(1.5deg) scale(1.02);
        }
        100% {
          transform: translateY(0) rotate(0deg) scale(1);
        }
      }

      @keyframes bgPulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 0.9;
        }
      }
    </style>

    <div id="root"></div>
    <div id="loader" class="loader-container">
      <div class="loader-bg-orb loader-bg-orb-1"></div>

  <script>
    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    const schemeLinks = {
      light: document.querySelector('link[rel="manifest"][data-scheme="light"]'),
      dark: document.querySelector('link[rel="manifest"][data-scheme="dark"]'),
    };
    const schemeHrefs = {
      light: schemeLinks.light?.getAttribute("href"),
      dark: schemeLinks.dark?.getAttribute("href"),
    };

    const ensureManifestLink = () => {
      let active = document.querySelector('link[rel="manifest"][data-active="true"]');
      if (!active) {
        active = document.createElement("link");
        active.setAttribute("rel", "manifest");
        active.setAttribute("data-active", "true");
        document.head.appendChild(active);
      }
      return active;
    };

    const updateManifest = () => {
      const nextHref = mediaQuery.matches ? schemeHrefs.dark : schemeHrefs.light;
      if (!nextHref) return;
      const active = ensureManifestLink();
      active.setAttribute("href", nextHref);
    };

    updateManifest();
    schemeLinks.light?.remove();
    schemeLinks.dark?.remove();
    if (typeof mediaQuery.addEventListener === "function") {
      mediaQuery.addEventListener("change", updateManifest);
    } else if (typeof mediaQuery.addListener === "function") {
      mediaQuery.addListener(updateManifest);
    }
    document.getElementById("js-version").textContent = "v1.2.0";
